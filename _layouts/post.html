---
layout: default
---

<style>
    /* Basic post styling */
    .post-container {
        padding-top: 120px;
        padding-bottom: 60px;
        max-width: 800px;
        margin: 0 auto;
        padding-left: 20px;
        padding-right: 20px;
    }
    
    .post-title {
        font-size: 2.5rem;
        color: #1a365d;
        margin-bottom: 20px;
    }
    
    .post-meta {
        margin-bottom: 30px;
        color: #718096;
    }
    
    .post-content {
        line-height: 1.7;
    }
    
    .post-content h2 {
        color: #1a365d;
        margin-top: 40px;
        margin-bottom: 15px;
    }
    
    .post-content p {
        margin-bottom: 20px;
    }
    
    .post-content ul, .post-content ol {
        margin-bottom: 20px;
        margin-left: 20px;
    }
    
    .post-content li {
        margin-bottom: 5px;
    }
</style>

<div class="post-container">
    <h1 class="post-title">{{ page.title }}</h1>
    
    <div class="post-meta">
        <p>Published on {{ page.date | date: "%B %d, %Y" }} by {{ page.author }}</p>
        
        {% if page.tags.size > 0 %}
        <p>Tags: 
            {% for tag in page.tags %}
            <span>{{ tag }}</span>{% unless forloop.last %}, {% endunless %}
            {% endfor %}
        </p>
        {% endif %}
    </div>
    
    <div class="post-content">
        {{ content }}
    </div>
    
    <div class="post-nav" style="margin-top: 50px; padding-top: 20px; border-top: 1px solid #e2e8f0;">
        <p><a href="{{ site.baseurl }}/blog/" style="color: #1a365d; text-decoration: none;">← Back to all posts</a></p>
    </div>
</div>
