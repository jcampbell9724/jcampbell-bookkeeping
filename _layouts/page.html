---
layout: default
---

<div class="container">
    <div class="page">
        <header class="page-header">
            <h1>{{ page.title }}</h1>
        </header>

        <div class="page-content">
            {{ content }}
        </div>
    </div>
</div>

<style>
    .page {
        max-width: 1000px;
        margin: 0 auto;
        padding: 40px;
    }
    
    .page-header {
        margin-bottom: 30px;
    }
    
    .page-header h1 {
        font-size: 2.5rem;
        color: var(--primary-color);
    }
    
    .page-content h2 {
        font-size: 1.8rem;
        color: var(--primary-color);
        margin: 30px 0 15px;
    }
    
    .page-content h3 {
        font-size: 1.4rem;
        margin: 25px 0 15px;
    }
    
    .page-content p {
        margin-bottom: 20px;
    }
    
    .page-content ul, .page-content ol {
        margin: 0 0 20px 20px;
    }
    
    .page-content img {
        max-width: 100%;
        height: auto;
        margin: 20px 0;
        border-radius: 8px;
    }
</style>
