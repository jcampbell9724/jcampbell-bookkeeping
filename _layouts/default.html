<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} - {% endif %}Jcampbell Bookkeeping</title>
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📊</text></svg>">
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}Professional bookkeeping services for small businesses.{% endif %}">
    <meta name="keywords" content="{% if page.keywords %}{{ page.keywords }}{% else %}bookkeeping, small business accounting, tax preparation, financial services{% endif %}">
    <meta name="author" content="Jcampbell Bookkeeping">
    
    <!-- Link to external CSS file - attempt multiple paths -->
    <link rel="stylesheet" href="{{ site.baseurl }}/css/styles.css">

    
    <!-- Add inline CSS for critical blog styles to ensure they load -->
    <style>
        /* Basic blog styles to ensure functionality */
        .blog-container {
            padding: 120px 0 80px;
            min-height: calc(100vh - 300px);
        }
        
        .search-container {
            margin-bottom: 40px;
            display: flex;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .search-input {
            flex-grow: 1;
            padding: 12px 15px;
            border: 1px solid #e2e8f0;
            border-right: none;
            border-radius: 6px 0 0 6px;
            font-family: sans-serif;
            font-size: 1rem;
        }
        
        .search-btn {
            background-color: #1a365d;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 0 6px 6px 0;
            cursor: pointer;
        }
        
        .tag-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }
        
        .tag {
            background-color: rgba(43, 108, 176, 0.1);
            color: #1a365d;
            padding: 6px 15px;
            border-radius: 50px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .tag:hover, .tag.active {
            background-color: #1a365d;
            color: white;
        }
        
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        .blog-card {
            background-color: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        
        .blog-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        
        .blog-image {
            height: 200px;
            background-size: cover;
            background-position: center;
        }
        
        .blog-content {
            padding: 25px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        
        .blog-meta {
            display: flex;
            gap: 15px;
            color: #718096;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }
        
        .blog-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }
        
        .blog-tag {
            background-color: rgba(43, 108, 176, 0.1);
            color: #1a365d;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
        }
        
        .blog-title {
            font-size: 1.4rem;
            color: #1a202c;
            margin-bottom: 10px;
            line-height: 1.3;
        }
        
        .blog-excerpt {
            color: #718096;
            margin-bottom: 20px;
            flex-grow: 1;
        }
        
        .btn {
            display: inline-block;
            background-color: #1a365d;
            color: white;
            padding: 12px 28px;
            border-radius: 6px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            text-decoration: none;
        }
        
        .btn-outline {
            background-color: transparent;
            color: #1a365d;
            border: 2px solid #1a365d;
        }
        
        .blog-readmore {
            align-self: flex-start;
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            margin-top: 50px;
            gap: 10px;
        }
        
        .page-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: white;
            color: #1a365d;
            font-weight: 500;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            text-decoration: none;
        }
        
        .page-link:hover, .page-link.active {
            background-color: #1a365d;
            color: white;
        }
        
        .no-results {
            text-align: center;
            padding: 40px;
            color: #718096;
        }
        
        /* Mobile responsiveness */
        @media (max-width: 768px) {
            .blog-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    {% include header.html %}

    <!-- Main Content -->
    {{ content }}

    <!-- Footer -->
    {% include footer.html %}
</body>
</html>
