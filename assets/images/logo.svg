<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Base/Foundation with columns -->
  <rect x="50" y="200" width="300" height="30" fill="#2D5B89" rx="2" ry="2"/>
  
  <!-- Columns -->
  <rect x="70" y="140" width="20" height="60" fill="#1e4066" rx="2" ry="2"/>
  <rect x="130" y="140" width="20" height="60" fill="#1e4066" rx="2" ry="2"/>
  <rect x="190" y="140" width="20" height="60" fill="#1e4066" rx="2" ry="2"/>
  <rect x="250" y="140" width="20" height="60" fill="#1e4066" rx="2" ry="2"/>
  <rect x="310" y="140" width="20" height="60" fill="#1e4066" rx="2" ry="2"/>
  
  <!-- Top of building/ledger -->
  <rect x="50" y="120" width="300" height="20" fill="#2D5B89" rx="2" ry="2"/>
  
  <!-- Accent element (replacing the book) -->
  <rect x="140" y="95" width="120" height="25" fill="#e6b43a" rx="5" ry="5"/>
  <rect x="150" y="105" width="100" height="3" fill="#F5F7FA"/>
  <rect x="155" y="112" width="90" height="3" fill="#F5F7FA"/>
  
  <!-- Company Name -->
  <text x="200" y="250" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#2D5B89">FOUNDATION</text>
  <text x="200" y="275" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" fill="#6A8EAE">BOOKKEEPING</text>
</svg>
