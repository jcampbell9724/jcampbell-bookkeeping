title: Jcampbell Bookkeeping Blog
description: Financial insights for small businesses
theme: minima
baseurl: "" # the subpath of your site, e.g. /blog
url: "" # the base hostname & protocol for your site

# Build settings
markdown: kramdown

# Default front matter
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

# Collections
collections:
  posts:
    output: true
    permalink: /blog/:title/
