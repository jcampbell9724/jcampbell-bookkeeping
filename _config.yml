title: Jcampbell Bookkeeping Blog
description: Financial insights for small businesses
theme: minima

url: "https://jcampbell9724.github.io"
baseurl: "/jcampbell-bookkeeping"

# Build settings
markdown: kramdown

# Default front matter
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

# Collections
collections:
  posts:
    output: true
    permalink: /blog/:title/

include:
  - services.html
